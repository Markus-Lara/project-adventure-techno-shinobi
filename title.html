<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>TechnoShinobi-Title</title>
</head>
<body>
    <div class="title-box">
        <h1 id="title">Techno Shinobi</h1>
        <img src="/images/title-box.png" alt="title-box-image">
    </div>

    <div class="flower-border" id="Continue">
        <button class="start-option"><span class="Text">Continue</span></button>
        <img src="/images/start-option.png" alt="start-option-border">
    </div>

    <div class="flower-border" id="New-Game">
        <button class="start-option"><span class="Text">New Game</span></button>
        <img src="/images/start-option.png" alt="start-option-border">
    </div>
</body>
</html>
